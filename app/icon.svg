<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#06090E" rx="6"/>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#D4AF37" stroke-width="1.2" opacity="0.9"/>

  <!-- Inner ring -->
  <circle cx="16" cy="16" r="5" fill="none" stroke="#D4AF37" stroke-width="0.8" opacity="0.6"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#D4AF37"/>

  <!-- Top crosshair line -->
  <line x1="16" y1="4" x2="16" y2="10" stroke="#D4AF37" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Bottom crosshair line -->
  <line x1="16" y1="22" x2="16" y2="28" stroke="#D4AF37" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Left crosshair line -->
  <line x1="4" y1="16" x2="10" y2="16" stroke="#D4AF37" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Right crosshair line -->
  <line x1="22" y1="16" x2="28" y2="16" stroke="#D4AF37" stroke-width="1.4" stroke-linecap="round"/>
</svg>
